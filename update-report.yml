name: Update Market Liquidity Report

on:
  schedule:
    # 每天北京时间上午10:00执行（UTC 02:00），仅工作日
    - cron: '0 2 * * 1-5'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch data and generate report
        env:
          OUTPUT_DIR: docs
        run: python fetch_pbc_data.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet docs/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "没有数据变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到数据变化"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          today=$(date -u +%Y-%m-%d)
          git commit -m "📊 更新市场流动性报告 - $today" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        if: steps.check_changes.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true

      - name: Summary notification
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "## 📊 市场流动性报告已更新" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "报告已自动生成并部署到 GitHub Pages。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 数据抓取完成" >> $GITHUB_STEP_SUMMARY
          echo "✅ 报告已提交到仓库" >> $GITHUB_STEP_SUMMARY
          echo "✅ 已部署到 GitHub Pages" >> $GITHUB_STEP_SUMMARY
