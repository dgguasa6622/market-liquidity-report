<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场流动性统计报告 - 初始化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .placeholder {
            background: white; border-radius: 20px; padding: 60px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px;
        }
        .placeholder h1 { color: #1e3c72; font-size: 2em; margin-bottom: 20px; }
        .placeholder p { color: #666; line-height: 1.8; font-size: 1.1em; }
        .placeholder .emoji { font-size: 4em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="placeholder">
        <div class="emoji">📊</div>
        <h1>市场流动性统计报告</h1>
        <p>报告正在初始化中...<br>GitHub Actions 工作流首次运行后将自动生成报告。</p>
        <p style="margin-top: 20px; font-size: 0.9em; color: #999;">
            请前往 Actions 页面手动触发工作流，或等待下一个计划执行时间。
        </p>
    </div>
</body>
</html>
