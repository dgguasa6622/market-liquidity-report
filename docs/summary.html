<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            width: 900px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px;
            text-align: center;
            border-radius: 15px 15px 0 0;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header .date { font-size: 16px; opacity: 0.9; }
        .cards {
            display: flex;
            gap: 20px;
            padding: 25px;
            background: white;
            border-radius: 0 0 15px 15px;
        }
        .card {
            flex: 1;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border-left: 4px solid #2a5298;
        }
        .card h3 { color: #1e3c72; font-size: 16px; margin-bottom: 12px; }
        .card .amount { font-size: 36px; font-weight: 700; color: #2a5298; margin: 10px 0; }
        .card .unit { font-size: 13px; color: #666; }
        .card .detail { margin-top: 12px; font-size: 12px; color: #555; line-height: 1.6; }
        .footer {
            text-align: center;
            padding: 15px;
            color: white;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>市场流动性日报</h1>
        <div class="date">2026-07-01 | 中国人民银行公开市场业务</div>
    </div>
    <div class="cards">
        <div class="card">
            <h3>7天逆回购净投放量</h3>
            <div class="amount">15,915</div>
            <div class="unit">亿元（近2个月）</div>
            <div class="detail">
                总投放：69,246亿<br>
                总到期：53,331亿
            </div>
        </div>
        <div class="card">
            <h3>买断式逆回购存续量</h3>
            <div class="amount">54,000</div>
            <div class="unit">亿元（当前存续）</div>
            <div class="detail">
                总投放：117,000亿<br>
                已到期：63,000亿
            </div>
        </div>
        <div class="card">
            <h3>MLF净投放量</h3>
            <div class="amount">54,000</div>
            <div class="unit">亿元（近24个月）</div>
            <div class="detail">
                总投放：54,000亿<br>
                总到期：0亿
            </div>
        </div>
    </div>
    <div class="footer">数据来源：中国人民银行官网 | 自动生成</div>
</body>
</html>
