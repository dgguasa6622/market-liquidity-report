name: Update Market Liquidity Report

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch data and generate report
        env:
          OUTPUT_DIR: docs
        run: python fetch_pbc_data.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet docs/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "没有数据变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到数据变化"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          today=$(date -u +%Y-%m-%d)
          git commit -m "📊 更新市场流动性报告 - $today" || echo "No changes to commit"
          git push

      - name: Setup Pages
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        if: steps.check_changes.outputs.changed == 'true'
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Summary notification
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "## 📊 市场流动性报告已更新" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "报告已自动生成并部署到 GitHub Pages。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 数据抓取完成" >> $GITHUB_STEP_SUMMARY
          echo "✅ 报告已提交到仓库" >> $GITHUB_STEP_SUMMARY
          echo "✅ 已部署到 GitHub Pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [查看报告](${{ steps.deploy.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
